name: synapse

services:
  postgres-synapse:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    
    expose:
      - "5432"
    volumes:
      - synapse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-net

  redis-synapse:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - synapse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    networks:
      - synapse-net

  migrate-synapse:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: build
    container_name: synapse-migrate
    restart: "no"
    env_file: ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-synapse:5432/${POSTGRES_DB}?schema=public
    command: ["npx", "prisma", "migrate", "deploy", "--schema", "prisma/schema.prisma"]
    depends_on:
      postgres-synapse:
        condition: service_healthy
    networks:
      - synapse-net

  api-synapse:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: synapse-api
    restart: unless-stopped
    env_file: ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-synapse:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis-synapse:6379
      NODE_ENV: production
    ports:
      - "127.0.0.1:5000:3000" 
    depends_on:
      postgres-synapse:
        condition: service_healthy
      migrate-synapse:
        condition: service_completed_successfully
    networks:
      - synapse-net

  web-synapse:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: synapse-web
    restart: unless-stopped
    env_file: ../../apps/web/.env
    ports:
      - "127.0.0.1:5001:3000" 
    networks:
      - synapse-net

networks:
  synapse-net:
    driver: bridge

volumes:
  synapse-postgres-data:
  synapse-redis-data: