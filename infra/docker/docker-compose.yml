name: synapse

# ---------------------------------------------------------------------------
# Shared environment anchors
# ---------------------------------------------------------------------------
x-api-env: &api-env
  DATABASE_URL: postgresql://synapse:synapse@postgres-synapse:5432/synapse?schema=public
  REDIS_URL: redis://redis-synapse:6379
  NODE_ENV: production

services:

  # -------------------------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------------------------
  postgres-synapse:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    ports:
      - "5435:5432"
    volumes:
      - synapse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis-synapse:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--loglevel", "warning"]
    ports:
      - "6380:6379"
    volumes:
      - synapse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend

  # -------------------------------------------------------------------------
  # Migration runner (runs once, then exits)
  # -------------------------------------------------------------------------
  migrate-synapse:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: build
    container_name: synapse-migrate
    restart: "no"
    environment:
      <<: *api-env
    env_file:
      - path: ../../.env
        required: false
    command: ["npx", "prisma", "migrate", "deploy", "--schema", "prisma/schema.prisma"]
    working_dir: /app/apps/api
    depends_on:
      postgres-synapse:
        condition: service_healthy
    networks:
      - backend

  # -------------------------------------------------------------------------
  # API
  # -------------------------------------------------------------------------
  api-synapse:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: synapse-api
    restart: unless-stopped
    environment:
      <<: *api-env
    env_file:
      - path: ../../.env
        required: false
    ports:
      - "5000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres-synapse:
        condition: service_healthy
      redis-synapse:
        condition: service_healthy
      migrate-synapse:
        condition: service_completed_successfully
    networks:
      - backend
      - frontend

  # -------------------------------------------------------------------------
  # Web
  # -------------------------------------------------------------------------
  web-synapse:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/v1
    container_name: synapse-web
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    ports:
      - "5001:3000"
    depends_on:
      api-synapse:
        condition: service_healthy
    networks:
      - frontend

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  synapse-postgres-data:
  synapse-redis-data:
