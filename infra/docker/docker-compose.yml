services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    ports:
      - "5432:5432"
    volumes:
      - synapse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - synapse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: synapse-api
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: postgresql://synapse:synapse@postgres:5432/synapse?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: synapse-web
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  synapse-postgres-data:
  synapse-redis-data:
